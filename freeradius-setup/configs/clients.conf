#===============================================================================
# FreeRADIUS Clients Configuration
# For RADIUS SaaS Platform
#
# Copy this file to: /etc/freeradius/3.0/clients.conf
#
# This file defines which NAS devices (MikroTik routers) can connect to RADIUS
#===============================================================================

#===============================================================================
# LOCALHOST - For testing
#===============================================================================
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
    shortname = localhost
}

client localhost_ipv6 {
    ipaddr = ::1
    secret = testing123
    require_message_authenticator = no
}

#===============================================================================
# DYNAMIC CLIENTS FROM DATABASE
# The system reads NAS devices from the 'nas' table in your database
# This allows you to add/remove routers from the web interface
#===============================================================================

# Allow connections from any IP (for dynamic NAS management)
# The actual authentication is done via the shared secret
#
# SECURITY NOTE: In production, you may want to restrict this to specific
# IP ranges or use the database-driven client configuration exclusively

client dynamic_clients {
    ipaddr = 0.0.0.0/0
    
    # IMPORTANT: Change this to match your RADIUS secret
    # This should match the secret configured in your MikroTik routers
    secret = your_radius_secret_here
    
    # MikroTik specific settings
    require_message_authenticator = no
    nas_type = mikrotik
    
    # Virtual server to use
    virtual_server = default
    
    # Shortname for logging
    shortname = dynamic
}

#===============================================================================
# STATIC CLIENTS (Optional)
# Add specific routers here if you prefer static configuration
#===============================================================================

# Example: Office Router
# client office_router {
#     ipaddr = 192.168.1.1
#     secret = office_secret_123
#     require_message_authenticator = no
#     nas_type = mikrotik
#     shortname = office
# }

# Example: Branch Router
# client branch_router {
#     ipaddr = 10.0.0.1
#     secret = branch_secret_456
#     require_message_authenticator = no
#     nas_type = mikrotik
#     shortname = branch
# }

#===============================================================================
# VPN CLIENTS
# If using VPN, add clients for the VPN subnet
#===============================================================================

# VPN Subnet (if using PPTP/SSTP VPN)
# client vpn_clients {
#     ipaddr = 10.0.0.0/24
#     secret = vpn_radius_secret
#     require_message_authenticator = no
#     nas_type = mikrotik
#     shortname = vpn
# }

#===============================================================================
# NOTES ON CLIENT CONFIGURATION
#===============================================================================
#
# ipaddr: The IP address or subnet of the NAS device
#   - Single IP: 192.168.1.1
#   - Subnet: 192.168.1.0/24
#   - Any: 0.0.0.0/0
#
# secret: Shared secret between RADIUS and NAS
#   - Must match the secret configured on MikroTik
#   - Use strong, random secrets in production
#
# require_message_authenticator: 
#   - Set to 'no' for MikroTik compatibility
#   - MikroTik doesn't support Message-Authenticator by default
#
# nas_type:
#   - 'mikrotik' for MikroTik routers
#   - 'cisco' for Cisco devices
#   - 'other' for generic NAS
#
# shortname: A friendly name for logging purposes
#
#===============================================================================

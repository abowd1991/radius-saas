#===============================================================================
# FreeRADIUS SQL Module Configuration
# For RADIUS SaaS Platform
#
# Copy this file to: /etc/freeradius/3.0/mods-available/sql
# Then enable it: ln -sf /etc/freeradius/3.0/mods-available/sql /etc/freeradius/3.0/mods-enabled/sql
#
# IMPORTANT: Update the database credentials below before using!
#===============================================================================

sql {
    # Database driver
    driver = "rlm_sql_mysql"
    dialect = "mysql"
    
    #===========================================================================
    # DATABASE CONNECTION - UPDATE THESE VALUES!
    #===========================================================================
    # Your RADIUS SaaS database connection details
    # Get these from your Manus project settings
    
    server = "YOUR_DATABASE_HOST"      # e.g., gateway01.us-east-1.prod.aws.tidbcloud.com
    port = 4000                         # Default TiDB port
    login = "YOUR_DATABASE_USER"        # Your database username
    password = "YOUR_DATABASE_PASSWORD" # Your database password
    radius_db = "YOUR_DATABASE_NAME"    # Usually: radius_saas
    
    #===========================================================================
    
    # MySQL/TiDB specific settings
    mysql {
        # TLS/SSL Configuration (required for TiDB Cloud)
        tls {
            ca_file = "/etc/ssl/certs/ca-certificates.crt"
            cipher = "DHE-RSA-AES256-SHA:AES128-SHA"
        }
        
        # Warning level
        warnings = auto
    }
    
    # Connection pool settings
    pool {
        start = 5           # Initial connections
        min = 3             # Minimum connections
        max = 32            # Maximum connections
        spare = 3           # Spare connections
        uses = 0            # Max uses per connection (0 = unlimited)
        lifetime = 0        # Connection lifetime (0 = unlimited)
        idle_timeout = 60   # Idle timeout in seconds
    }
    
    # Read NAS clients from database
    read_clients = yes
    client_table = "nas"
    
    #===========================================================================
    # AUTHORIZATION QUERIES
    # These queries check user credentials from radcheck table
    #===========================================================================
    
    # Check user attributes (password, etc.)
    authorize_check_query = "\
        SELECT id, username, attribute, value, op \
        FROM radcheck \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY id"
    
    # Get reply attributes for user
    authorize_reply_query = "\
        SELECT id, username, attribute, value, op \
        FROM radreply \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY id"
    
    #===========================================================================
    # GROUP QUERIES
    # These queries handle user groups
    #===========================================================================
    
    # Check group attributes
    authorize_group_check_query = "\
        SELECT id, groupname, attribute, value, op \
        FROM radgroupcheck \
        WHERE groupname = '%{SQL-Group}' \
        ORDER BY id"
    
    # Get group reply attributes
    authorize_group_reply_query = "\
        SELECT id, groupname, attribute, value, op \
        FROM radgroupreply \
        WHERE groupname = '%{SQL-Group}' \
        ORDER BY id"
    
    # Get user's groups
    group_membership_query = "\
        SELECT groupname \
        FROM radusergroup \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY priority"
    
    #===========================================================================
    # SIMULTANEOUS USE QUERIES
    # These queries check for concurrent sessions
    #===========================================================================
    
    # Count active sessions for user
    simul_count_query = "\
        SELECT COUNT(*) \
        FROM radacct \
        WHERE username = '%{SQL-User-Name}' \
        AND acctstoptime IS NULL"
    
    # Verify active sessions
    simul_verify_query = "\
        SELECT radacctid, acctsessionid, username, nasipaddress, nasportid, \
               framedipaddress, callingstationid, framedprotocol \
        FROM radacct \
        WHERE username = '%{SQL-User-Name}' \
        AND acctstoptime IS NULL"
    
    #===========================================================================
    # ACCOUNTING QUERIES
    # These queries log session data to radacct table
    #===========================================================================
    
    accounting {
        # Reference for query variables:
        # %{Acct-Session-Id}      - Session ID
        # %{Acct-Unique-Session-Id} - Unique session ID
        # %{SQL-User-Name}        - Username
        # %{NAS-IP-Address}       - NAS IP
        # %{NAS-Port}             - NAS Port
        # %{Acct-Session-Time}    - Session duration in seconds
        # %{Acct-Input-Octets}    - Bytes downloaded
        # %{Acct-Output-Octets}   - Bytes uploaded
        
        # Session start
        start_query = "\
            INSERT INTO radacct \
                (acctsessionid, acctuniqueid, username, realm, nasipaddress, \
                 nasportid, nasporttype, acctstarttime, acctupdatetime, \
                 acctstoptime, acctsessiontime, acctauthentic, connectinfo_start, \
                 acctinputoctets, acctoutputoctets, calledstationid, callingstationid, \
                 acctterminatecause, servicetype, framedprotocol, framedipaddress) \
            VALUES \
                ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
                 '%{Realm}', '%{NAS-IP-Address}', '%{%{NAS-Port-Id}:-%{NAS-Port}}', \
                 '%{NAS-Port-Type}', \
                 FROM_UNIXTIME(%{integer:Event-Timestamp}), \
                 FROM_UNIXTIME(%{integer:Event-Timestamp}), \
                 NULL, 0, '%{Acct-Authentic}', '%{Connect-Info}', \
                 0, 0, '%{Called-Station-Id}', '%{Calling-Station-Id}', \
                 '', '%{Service-Type}', '%{Framed-Protocol}', '%{Framed-IP-Address}')"
        
        # Interim update (periodic updates during session)
        interim_query = "\
            UPDATE radacct \
            SET acctupdatetime = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
                acctsessiontime = %{%{Acct-Session-Time}:-0}, \
                acctinputoctets = %{%{Acct-Input-Octets}:-0}, \
                acctoutputoctets = %{%{Acct-Output-Octets}:-0}, \
                framedipaddress = '%{Framed-IP-Address}' \
            WHERE acctsessionid = '%{Acct-Session-Id}' \
            AND username = '%{SQL-User-Name}' \
            AND nasipaddress = '%{NAS-IP-Address}'"
        
        # Session stop
        stop_query = "\
            UPDATE radacct \
            SET acctstoptime = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
                acctsessiontime = %{%{Acct-Session-Time}:-0}, \
                acctinputoctets = %{%{Acct-Input-Octets}:-0}, \
                acctoutputoctets = %{%{Acct-Output-Octets}:-0}, \
                acctterminatecause = '%{Acct-Terminate-Cause}', \
                framedipaddress = '%{Framed-IP-Address}' \
            WHERE acctsessionid = '%{Acct-Session-Id}' \
            AND username = '%{SQL-User-Name}' \
            AND nasipaddress = '%{NAS-IP-Address}'"
    }
    
    #===========================================================================
    # POST-AUTH LOGGING
    # Log authentication attempts
    #===========================================================================
    
    post-auth {
        query = "\
            INSERT INTO radpostauth \
                (username, pass, reply, authdate) \
            VALUES \
                ('%{SQL-User-Name}', '%{%{User-Password}:-%{Chap-Password}}', \
                 '%{reply:Packet-Type}', NOW())"
    }
}
